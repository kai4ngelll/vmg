<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Viperr — Поймай яйцо</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { height: 100%; overflow: hidden; background: #0a0505; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, rgba(192,57,43,0.12) 0%, transparent 70%),
                  linear-gradient(180deg, #0a0505 0%, #050202 100%);
    }

    #load-screen {
      position: fixed; inset: 0; z-index: 500;
      background: #0a0505;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 30px;
      transition: opacity 0.6s ease;
    }
    #load-screen.hide { opacity: 0; pointer-events: none; }
    .load-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 8vw, 48px);
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 0 60px rgba(192,57,43,0.4);
    }
    .load-title span { color: #f5c542; }
    .load-msg { font-size: 14px; color: #a08070; max-width: 320px; text-align: center; }
    .load-msg b { color: #f5c542; }
    .load-bar-wrap {
      width: min(260px, 70vw); height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px; overflow: hidden;
    }
    .load-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #c0392b, #f5c542);
      border-radius: 10px;
      animation: loadfill 2.5s linear forwards;
    }
    @keyframes loadfill { 0%{ width: 0%; } 100%{ width: 100%; } }

    #game-container {
      position: relative;
      width: 100%; max-width: 480px;
      height: 100vh; max-height: 820px;
      touch-action: none;
      cursor: none;
      border: 2px solid #2a1010;
      border-radius: 16px;
      overflow: hidden;
      background: #0a0505;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 20%, rgba(192,57,43,0.06) 0%, transparent 60%),
                  linear-gradient(180deg, #0f0707 0%, #050202 100%);
    }

    #result-overlay {
      position: fixed; inset: 0; z-index: 60;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
    }
    #result-overlay.show { opacity: 1; pointer-events: auto; }
    .result-card {
      background: linear-gradient(135deg, #1a0a0a, #2d1212);
      border: 2px solid rgba(245,197,66,0.12);
      border-radius: 20px;
      padding: 32px 24px;
      width: min(320px, 100%);
      text-align: center;
      transform: scale(0.85);
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    #result-overlay.show .result-card { transform: scale(1); }
    .result-card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, #f5c542, transparent);
    }
    .result-icon { font-size: 48px; margin-bottom: 6px; }
    .result-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: #fff;
      margin-bottom: 4px;
    }
    .result-sub { font-size: 14px; color: #a08070; margin-bottom: 16px; }
    .coin-earned {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(245,197,66,0.08);
      border: 1px solid rgba(245,197,66,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: #f5c542;
      animation: coinPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes coinPop { 0%{ transform: scale(0.7); opacity: 0; } 100%{ transform: scale(1); opacity: 1; } }
    .result-btn {
      background: linear-gradient(135deg, #c0392b, #f5c542);
      border: none; border-radius: 12px;
      padding: 12px 24px;
      color: #1a0a0a;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      margin: 4px;
      transition: transform 0.15s;
    }
    .result-btn:active { transform: scale(0.94); }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(245,197,66,0.25);
      border-radius: 12px;
      padding: 12px 24px;
      color: #a08070;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      margin: 4px;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: #f5c542; color: #f5c542; }
  </style>
</head>
<body>

<div id="load-screen">
  <div class="load-title">Viperr <span>Game</span></div>
  <div class="load-msg">Поймай <b>10 яиц</b> за 1 минуту</div>
  <div class="load-bar-wrap"><div class="load-bar-fill"></div></div>
</div>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="resultIcon">🍳</div>
    <div class="result-title" id="resultTitle">Эх, бро, неудача</div>
    <div class="result-sub" id="resultSub">В следующий раз повезет!</div>
    <div id="resultCoin" class="coin-earned" style="display:none;">🪙 +1 VMG Coin</div>
    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:4px;">
      <button class="result-btn" id="restartBtn">🔁 Ещё раз</button>
      <button class="back-btn" onclick="window.location.href='index.html'">← На главную</button>
    </div>
  </div>
</div>

<audio id="bgm" src="song3.mp3" preload="auto" loop></audio>

<script>
// ====== USER SYSTEM ======
const USK = 'viperr_user', CSK = 'viperr_coins_v1';
function getUser() {
  if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
    const u = window.Telegram.WebApp.initDataUnsafe.user;
    const user = { id: String(u.id), name: [u.first_name, u.last_name].filter(Boolean).join(' '), handle: u.username || '', photo: u.photo_url || '' };
    localStorage.setItem(USK, JSON.stringify(user));
    return user;
  }
  const p = new URLSearchParams(location.search);
  if (p.get('uid') || p.get('name')) {
    const user = { id: p.get('uid') || 'g' + Date.now(), name: p.get('name') || 'Игрок', handle: p.get('username') || '', photo: p.get('photo') || '' };
    localStorage.setItem(USK, JSON.stringify(user));
    return user;
  }
  try { const saved = localStorage.getItem(USK); if (saved) return JSON.parse(saved); } catch {}
  return null;
}
function awardCoin(uid) {
  try { const all = JSON.parse(localStorage.getItem(CSK) || '{}'); all[uid] = (all[uid] || 0) + 1; localStorage.setItem(CSK, JSON.stringify(all)); return true; } catch { return false; }
}

// ====== CANVAS SETUP ======
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');

let W, H, scale;
function resize() {
  const rect = container.getBoundingClientRect();
  W = canvas.width = rect.width * devicePixelRatio;
  H = canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  scale = W / rect.width;
}
resize();
window.addEventListener('resize', resize);

// ====== CONSTANTS ======
const GAME_DURATION = 60, TARGET = 10, MAX_HP = 3;
const ITEMS = [
  { id: 'egg', emoji: '🥚', weight: 55, score: 1 },
  { id: 'bomb', emoji: '💣', weight: 30, score: -1 },
  { id: 'coin', emoji: '🪙', weight: 15, score: 0 },
];

// ====== LOAD PLAYER IMAGE ======
const playerImg = new Image();
playerImg.src = 'IMG_20260620_221002_447.PNG';

// ====== STATE ======
let items = [];
let score = 0, hp = MAX_HP, timeLeft = GAME_DURATION;
let gameRunning = false;
let spawnTimer = 0;
let playerX = 0.5;
let playerWidth = 0;
let animId = null;
let lastTime = 0;

// ====== LOADING ======
setTimeout(() => {
  document.getElementById('load-screen').classList.add('hide');
  startGame();
}, 2500);

// ====== START ======
function startGame() {
  gameRunning = true;
  score = 0; hp = MAX_HP; timeLeft = GAME_DURATION;
  items = [];
  spawnTimer = 0;
  playerWidth = W * 0.14;
  document.getElementById('bgm').currentTime = 0;
  document.getElementById('bgm').play().catch(() => {});
  if (animId) cancelAnimationFrame(animId);
  lastTime = performance.now();
  animId = requestAnimationFrame(gameLoop);
}

// ====== GAME LOOP (оптимизированный) ======
const ITEM_SIZE = 32;
const PLAYER_BOTTOM = 0.08;
const BASKET_OFFSET = 0.08;
const SPEED = 180; // пикселей в секунду

// Массивы для предварительного выделения
let itemX = [], itemY = [], itemType = [], itemEmoji = [];
let itemCount = 0;

function gameLoop(timestamp) {
  if (!gameRunning) return;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Обновление таймера
  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; endGame(false); return; }

  // Спавн
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = 0.4 + Math.random() * 0.5;
    const type = weightedRandom(ITEMS);
    items.push({
      x: 20 + Math.random() * (W - 40),
      y: -30,
      type: type.id,
      emoji: type.emoji
    });
  }

  // Обновление позиций предметов
  const speedPx = SPEED * scale * dt;
  const playerY = H * (1 - PLAYER_BOTTOM);
  const px = playerX * W;
  const basketY = playerY - BASKET_OFFSET * H;
  const basketW = playerWidth * 0.7;
  const bx = px - basketW * 0.5;

  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += speedPx;

    if (item.y > H + 40) {
      items.splice(i, 1);
      continue;
    }

    // Проверка ловли
    if (item.y > basketY - ITEM_SIZE * 0.5 && item.y < basketY + ITEM_SIZE * 0.3 &&
        item.x > bx && item.x < bx + basketW) {
      if (item.type === 'egg') { score++; }
      else if (item.type === 'bomb') { hp--; }
      items.splice(i, 1);
      if (score >= TARGET) { endGame(true); return; }
      if (hp <= 0) { endGame(false); return; }
    }
  }

  // Отрисовка
  draw();
  animId = requestAnimationFrame(gameLoop);
}

function weightedRandom(arr) {
  const total = arr.reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (const t of arr) { r -= t.weight; if (r <= 0) return t; }
  return arr[0];
}

// ====== ОТРИСОВКА (оптимизированная) ======
function draw() {
  ctx.clearRect(0, 0, W, H);

  const playerY = H * (1 - PLAYER_BOTTOM);
  const pw = playerWidth;
  const ph = pw * 1.3;
  const px = playerX * W - pw * 0.5;

  // Игрок
  if (playerImg.complete && playerImg.naturalWidth > 0) {
    ctx.drawImage(playerImg, px, playerY - ph, pw, ph);
  } else {
    ctx.fillStyle = '#3a1a1a';
    ctx.fillRect(px, playerY - ph, pw, ph);
  }

  // Корзинка
  const basketY = playerY - BASKET_OFFSET * H;
  const basketW = pw * 0.7;
  const bx = px + (pw - basketW) * 0.5;

  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#6a3f1a';
  ctx.beginPath();
  ctx.roundRect(bx, basketY - 4, basketW, 14, 4);
  ctx.fill();
  ctx.fillStyle = '#4a2a0e';
  ctx.fillRect(bx + 4, basketY + 10, basketW - 8, 4);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8a5a2a';
  ctx.beginPath();
  ctx.ellipse(bx + basketW * 0.5, basketY - 4, basketW * 0.45, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Предметы
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.font = (ITEM_SIZE * 0.9) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const item of items) {
    ctx.fillText(item.emoji, item.x, item.y);
  }
  ctx.shadowBlur = 0;

  // UI
  ctx.font = '14px "Space Mono", monospace';
  ctx.fillStyle = '#6b4c3c';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('ЯЙЦА', 16, 14);
  ctx.font = '28px "Bebas Neue", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'top';
  ctx.fillText(score + '/' + TARGET, 16, 32);

  ctx.textAlign = 'right';
  ctx.font = '14px "Space Mono", monospace';
  ctx.fillStyle = '#6b4c3c';
  ctx.textBaseline = 'top';
  ctx.fillText('ВРЕМЯ', W - 16, 14);
  ctx.font = '28px "Bebas Neue", sans-serif';
  ctx.fillStyle = timeLeft <= 10 ? '#f5c542' : '#fff';
  ctx.textBaseline = 'top';
  ctx.fillText(formatTime(timeLeft), W - 16, 32);

  // Жизни
  const heartsY = 14;
  const heartsX = W * 0.5 - 30;
  ctx.textAlign = 'left';
  ctx.font = '22px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  let hStr = '';
  for (let i = 0; i < MAX_HP; i++) hStr += i < hp ? '❤️' : '🖤';
  ctx.fillText(hStr, heartsX, heartsY);
}

function formatTime(s) {
  const m = Math.floor(Math.max(0, s) / 60);
  const sec = Math.floor(Math.max(0, s) % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// ====== УПРАВЛЕНИЕ ======
function handleMove(clientX) {
  if (!gameRunning) return;
  const rect = container.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width;
  playerX = Math.max(0.05, Math.min(0.95, x));
}

container.addEventListener('mousemove', (e) => { if (e.buttons === 1) handleMove(e.clientX); });
container.addEventListener('mousedown', (e) => handleMove(e.clientX));
container.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; if (t) handleMove(t.clientX); }, { passive: false });
container.addEventListener('touchstart', (e) => { const t = e.touches[0]; if (t) handleMove(t.clientX); }, { passive: true });

// ====== ЗАВЕРШЕНИЕ ======
function endGame(win) {
  if (!gameRunning) return;
  gameRunning = false;
  if (animId) cancelAnimationFrame(animId);
  document.getElementById('bgm').pause();

  const overlay = document.getElementById('result-overlay');
  document.getElementById('resultIcon').textContent = win ? '🎉' : '😢';
  document.getElementById('resultTitle').textContent = win ? 'Ого, молодец!' : 'Эх, бро, неудача';
  document.getElementById('resultSub').textContent = win ? `Ты поймал ${score} яиц!` : `Ты поймал ${score} из 10. В следующий раз повезет!`;
  const coinEl = document.getElementById('resultCoin');
  if (win) {
    const user = getUser();
    if (user && awardCoin(user.id)) coinEl.style.display = 'flex';
    else coinEl.style.display = 'none';
  } else {
    coinEl.style.display = 'none';
  }
  overlay.classList.add('show');
}

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('resultCoin').style.display = 'none';
  startGame();
});

// ====== ROUND RECT POLYFILL ======
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2;
    if (r > h/2) r = h/2;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

// ====== ИНИЦИАЛИЗАЦИЯ ======
setTimeout(() => {
  playerWidth = W * 0.14;
}, 100);
</script>
</body>
  </html>
