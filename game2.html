<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Viperr — Поймай яйцо</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { height: 100%; overflow: hidden; background: #0a0505; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 50% 30%, rgba(192,57,43,0.12) 0%, transparent 70%),
                  linear-gradient(180deg, #0a0505 0%, #050202 100%);
    }

    /* LOADING */
    #load-screen {
      position: fixed; inset: 0; z-index: 500;
      background: #0a0505;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 30px;
      transition: opacity 0.6s ease;
    }
    #load-screen.hide { opacity: 0; pointer-events: none; }
    .load-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 8vw, 48px);
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 0 60px rgba(192,57,43,0.4);
    }
    .load-title span { color: #f5c542; }
    .load-msg {
      font-size: 14px; color: #a08070; max-width: 320px; text-align: center;
    }
    .load-msg b { color: #f5c542; }
    .load-bar-wrap {
      width: min(260px, 70vw); height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px; overflow: hidden;
    }
    .load-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #c0392b, #f5c542);
      border-radius: 10px;
      animation: loadfill 3s linear forwards;
    }
    @keyframes loadfill { 0%{ width: 0%; } 100%{ width: 100%; } }

    /* GAME */
    #game-container {
      position: relative;
      width: 100%; max-width: 480px;
      height: 100vh; max-height: 820px;
      background: radial-gradient(ellipse at 50% 20%, rgba(192,57,43,0.06) 0%, transparent 60%),
                  linear-gradient(180deg, #0f0707 0%, #050202 100%);
      overflow: hidden;
      border: 2px solid #2a1010;
      border-radius: 16px;
      touch-action: none;
      cursor: none;
    }

    /* UI */
    #ui {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
      background: linear-gradient(180deg, rgba(5,2,2,0.85) 0%, transparent 100%);
      pointer-events: none;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .ui-block { display: flex; flex-direction: column; align-items: center; }
    .ui-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 0.2em;
      color: #6b4c3c; text-transform: uppercase;
    }
    .ui-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: #fff;
      text-shadow: 0 0 30px rgba(245,197,66,0.1);
      line-height: 1;
    }
    .ui-value.low { color: #f5c542; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%,100%{ opacity: 1; } 50%{ opacity: 0.3; } }
    .hearts { font-size: 20px; letter-spacing: 2px; filter: drop-shadow(0 0 12px rgba(192,57,43,0.2)); }

    /* PLAYER */
    #player {
      position: absolute;
      bottom: 24px;
      width: 80px;
      z-index: 10;
      pointer-events: none;
      transform: translateX(-50%);
      will-change: left;
    }
    #player img {
      width: 100%;
      display: block;
      filter: drop-shadow(0 12px 40px rgba(0,0,0,0.9));
      image-rendering: auto;
    }
    #basket {
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      width: 54px; height: 14px;
      background: linear-gradient(180deg, #7a4a2a, #3a1f0a);
      border-radius: 4px 4px 0 0;
      border-bottom: 3px solid #1a0a04;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    #basket::after {
      content: '';
      position: absolute;
      top: -5px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 7px;
      background: linear-gradient(180deg, #8a5a2a, #5a3515);
      border-radius: 50%;
      border-bottom: 2px solid #1a0a04;
    }

    /* ITEMS */
    .item {
      position: absolute;
      width: 30px; height: 30px;
      top: -40px;
      pointer-events: none;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.6));
      will-change: transform, top, left;
    }
    .item.egg { font-size: 26px; }
    .item.bomb { font-size: 28px; }
    .item.coin { font-size: 24px; }

    /* POPUP */
    .score-popup {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #f5c542;
      pointer-events: none;
      z-index: 15;
      animation: popFade 0.6s ease-out forwards;
      text-shadow: 0 0 30px rgba(245,197,66,0.3);
    }
    @keyframes popFade {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
    }

    /* RESULT */
    #result-overlay {
      position: fixed; inset: 0; z-index: 60;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
    }
    #result-overlay.show { opacity: 1; pointer-events: auto; }
    .result-card {
      background: linear-gradient(135deg, #1a0a0a, #2d1212);
      border: 2px solid rgba(245,197,66,0.12);
      border-radius: 20px;
      padding: 32px 24px;
      width: min(320px, 100%);
      text-align: center;
      transform: scale(0.85);
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    #result-overlay.show .result-card { transform: scale(1); }
    .result-card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, #f5c542, transparent);
    }
    .result-icon { font-size: 48px; margin-bottom: 6px; }
    .result-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: #fff;
      margin-bottom: 4px;
    }
    .result-sub {
      font-size: 14px; color: #a08070; margin-bottom: 16px;
    }
    .coin-earned {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(245,197,66,0.08);
      border: 1px solid rgba(245,197,66,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: #f5c542;
      animation: coinPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes coinPop { 0%{ transform: scale(0.7); opacity: 0; } 100%{ transform: scale(1); opacity: 1; } }
    .result-btn {
      background: linear-gradient(135deg, #c0392b, #f5c542);
      border: none; border-radius: 12px;
      padding: 12px 24px;
      color: #1a0a0a;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      margin: 4px;
      transition: transform 0.15s;
    }
    .result-btn:active { transform: scale(0.94); }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(245,197,66,0.25);
      border-radius: 12px;
      padding: 12px 24px;
      color: #a08070;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      margin: 4px;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: #f5c542; color: #f5c542; }

    @media (max-width: 480px) {
      #player { width: 64px; bottom: 16px; }
      #basket { width: 44px; height: 12px; top: -11px; }
      #basket::after { width: 50px; height: 6px; top: -4px; }
      .item { width: 24px; height: 24px; font-size: 18px; }
      .ui-value { font-size: 22px; }
      .hearts { font-size: 16px; }
    }
    @media (max-width: 380px) {
      #player { width: 54px; bottom: 12px; }
      #basket { width: 36px; height: 10px; top: -9px; }
      #basket::after { width: 42px; height: 5px; top: -3px; }
      .item { width: 20px; height: 20px; font-size: 15px; }
      .ui-value { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="load-screen">
  <div class="load-title">Viperr <span>Game</span></div>
  <div class="load-msg">Поймай <b>10 яиц</b> за 1 минуту</div>
  <div class="load-bar-wrap"><div class="load-bar-fill"></div></div>
</div>

<div id="game-container">
  <div id="ui">
    <div class="ui-block">
      <div class="ui-label">Яйца</div>
      <div class="ui-value" id="scoreDisplay">0/10</div>
    </div>
    <div class="ui-block">
      <div class="ui-label">Время</div>
      <div class="ui-value" id="timerDisplay">1:00</div>
    </div>
    <div class="ui-block">
      <div class="ui-label">Жизни</div>
      <div class="hearts" id="heartsDisplay">❤️❤️❤️</div>
    </div>
  </div>

  <div id="player">
    <img id="playerImg" src="IMG_20260620_221002_447.PNG" alt="Персонаж" draggable="false">
    <div id="basket"></div>
  </div>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="resultIcon">🍳</div>
    <div class="result-title" id="resultTitle">Эх, бро, неудача</div>
    <div class="result-sub" id="resultSub">В следующий раз повезет!</div>
    <div id="resultCoin" class="coin-earned" style="display:none;">🪙 +1 VMG Coin</div>
    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:4px;">
      <button class="result-btn" id="restartBtn">🔁 Ещё раз</button>
      <button class="back-btn" onclick="window.location.href='index.html'">← На главную</button>
    </div>
  </div>
</div>

<audio id="bgm" src="song3.mp3" preload="auto" loop></audio>

<script>
// ====== USER SYSTEM ======
const USK = 'viperr_user', CSK = 'viperr_coins_v1';
function getUser() {
  if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
    const u = window.Telegram.WebApp.initDataUnsafe.user;
    const user = { id: String(u.id), name: [u.first_name, u.last_name].filter(Boolean).join(' '), handle: u.username || '', photo: u.photo_url || '' };
    localStorage.setItem(USK, JSON.stringify(user));
    return user;
  }
  const p = new URLSearchParams(location.search);
  if (p.get('uid') || p.get('name')) {
    const user = { id: p.get('uid') || 'g' + Date.now(), name: p.get('name') || 'Игрок', handle: p.get('username') || '', photo: p.get('photo') || '' };
    localStorage.setItem(USK, JSON.stringify(user));
    return user;
  }
  try { const saved = localStorage.getItem(USK); if (saved) return JSON.parse(saved); } catch {}
  return null;
}
function awardCoin(uid) {
  try { const all = JSON.parse(localStorage.getItem(CSK) || '{}'); all[uid] = (all[uid] || 0) + 1; localStorage.setItem(CSK, JSON.stringify(all)); return true; } catch { return false; }
}

// ====== GAME ======
const GAME_DURATION = 60, TARGET = 10, MAX_HP = 3;
const ITEMS = [
  { id: 'egg', emoji: '🥚', weight: 55, score: 1 },
  { id: 'bomb', emoji: '💣', weight: 30, score: -1 },
  { id: 'coin', emoji: '🪙', weight: 15, score: 0 },
];

const container = document.getElementById('game-container');
const playerEl = document.getElementById('player');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const heartsDisplay = document.getElementById('heartsDisplay');
const bgm = document.getElementById('bgm');

let items = [];
let score = 0, hp = MAX_HP, timeLeft = GAME_DURATION;
let gameRunning = false;
let spawnTimer = 0, spawnInterval = 0.6;
let animId = null;

// ====== LOADING ======
setTimeout(() => {
  document.getElementById('load-screen').classList.add('hide');
  startGame();
}, 3000);

// ====== START ======
function startGame() {
  gameRunning = true;
  score = 0; hp = MAX_HP; timeLeft = GAME_DURATION;
  items = [];
  document.querySelectorAll('.item, .score-popup').forEach(el => el.remove());
  updateUI();
  bgm.currentTime = 0;
  bgm.play().catch(() => {});
  if (animId) cancelAnimationFrame(animId);
  lastTime = performance.now();
  spawnTimer = 0;
  animId = requestAnimationFrame(gameLoop);
}

// ====== GAME LOOP (requestAnimationFrame) ======
let lastTime = 0;

function gameLoop(timestamp) {
  if (!gameRunning) return;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Timer
  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; endGame(false); return; }

  // Spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = 0.5 + Math.random() * 0.4;
    spawnItem();
  }

  // Move items
  const speed = 180; // пикселей в секунду
  const containerHeight = container.clientHeight;
  const playerRect = playerEl.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();

  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += speed * dt;

    // Remove if out
    if (item.y > containerHeight + 40) {
      items.splice(i, 1);
      continue;
    }

    // Catch detection
    const itemRect = {
      left: containerRect.left + item.x - 14,
      right: containerRect.left + item.x + 14,
      top: containerRect.top + item.y - 14,
      bottom: containerRect.top + item.y + 14
    };
    const basketY = playerRect.top + 10;
    const basketLeft = playerRect.left + 14;
    const basketRight = playerRect.right - 14;

    if (itemRect.bottom > basketY && itemRect.top < basketY + 16 &&
        itemRect.right > basketLeft && itemRect.left < basketRight) {
      if (item.type === 'egg') { score++; showPopup(item.x, item.y, '+1 🥚'); }
      else if (item.type === 'bomb') { hp--; showPopup(item.x, item.y, '💥 -1 HP'); }
      else if (item.type === 'coin') { showPopup(item.x, item.y, '🪙'); }
      items.splice(i, 1);
      updateUI();
      if (score >= TARGET) { endGame(true); return; }
      if (hp <= 0) { endGame(false); return; }
    }
  }

  // Sync DOM
  syncItems();
  updateUI();
  animId = requestAnimationFrame(gameLoop);
}

// ====== SPAWN ======
function spawnItem() {
  if (!gameRunning) return;
  const w = container.clientWidth;
  const x = 20 + Math.random() * (w - 40);
  const type = weightedRandom(ITEMS);
  items.push({ x, y: -30, type: type.id, emoji: type.emoji });
  const el = document.createElement('div');
  el.className = 'item ' + type.id;
  el.textContent = type.emoji;
  el.style.left = x + 'px';
  el.style.top = '-30px';
  container.appendChild(el);
}

function weightedRandom(arr) {
  const total = arr.reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (const t of arr) { r -= t.weight; if (r <= 0) return t; }
  return arr[0];
}

// ====== SYNC ITEMS ======
function syncItems() {
  const els = container.querySelectorAll('.item');
  items.forEach((item, i) => {
    if (els[i]) {
      els[i].style.top = item.y + 'px';
      els[i].style.left = item.x + 'px';
    }
  });
  while (els.length > items.length) els[els.length - 1].remove();
}

// ====== UI ======
function updateUI() {
  scoreDisplay.textContent = `${score}/${TARGET}`;
  timerDisplay.textContent = formatTime(timeLeft);
  timerDisplay.classList.toggle('low', timeLeft <= 10);
  heartsDisplay.textContent = '❤️'.repeat(Math.max(0, hp)) + '🖤'.repeat(Math.max(0, MAX_HP - hp));
}

function formatTime(s) {
  const m = Math.floor(Math.max(0, s) / 60);
  const sec = Math.floor(Math.max(0, s) % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function showPopup(x, y, text) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = text;
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 10) + 'px';
  container.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

// ====== CONTROLS ======
function handleMove(clientX) {
  if (!gameRunning) return;
  const rect = container.getBoundingClientRect();
  const x = clientX - rect.left;
  const maxX = rect.width - playerEl.offsetWidth;
  const clamped = Math.max(0, Math.min(maxX, x - playerEl.offsetWidth / 2));
  playerEl.style.left = (clamped + playerEl.offsetWidth / 2) + 'px';
}

container.addEventListener('mousemove', (e) => { if (e.buttons === 1) handleMove(e.clientX); });
container.addEventListener('mousedown', (e) => handleMove(e.clientX));
container.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; if (t) handleMove(t.clientX); }, { passive: false });
container.addEventListener('touchstart', (e) => { const t = e.touches[0]; if (t) handleMove(t.clientX); }, { passive: true });

// ====== END ======
function endGame(win) {
  if (!gameRunning) return;
  gameRunning = false;
  if (animId) cancelAnimationFrame(animId);
  bgm.pause();

  const overlay = document.getElementById('result-overlay');
  document.getElementById('resultIcon').textContent = win ? '🎉' : '😢';
  document.getElementById('resultTitle').textContent = win ? 'Ого, молодец!' : 'Эх, бро, неудача';
  document.getElementById('resultSub').textContent = win ? `Ты поймал ${score} яиц!` : `Ты поймал ${score} из 10. В следующий раз повезет!`;
  const coinEl = document.getElementById('resultCoin');
  if (win) {
    const user = getUser();
    if (user && awardCoin(user.id)) coinEl.style.display = 'flex';
    else coinEl.style.display = 'none';
  } else {
    coinEl.style.display = 'none';
  }
  overlay.classList.add('show');
}

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('resultCoin').style.display = 'none';
  document.querySelectorAll('.item, .score-popup').forEach(el => el.remove());
  items = [];
  startGame();
});

// Init position
setTimeout(() => {
  const rect = container.getBoundingClientRect();
  playerEl.style.left = (rect.width / 2) + 'px';
}, 100);
</script>
</body>
        </html>
