<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viperr — Яйцелов</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07070c;
  --s1:#0f0f16;
  --line:rgba(255,255,255,0.07);
  --t1:#eeeef4;
  --t2:#8888a0;
  --t3:#484858;
  --red:#c0392b;
  --accent:#e04444;
  --gold:#f5c842;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;user-select:none;-webkit-tap-highlight-color:transparent;}

/* ===== LOADING ===== */
#load-screen{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:30px;text-align:center;
  transition:opacity 0.6s ease;
}
#load-screen.hide{opacity:0;pointer-events:none;}
.load-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(32px,8vw,52px);
  letter-spacing:0.08em;color:#fff;
  text-shadow:0 0 40px rgba(245,200,66,0.35);
  line-height:1.1;
}
.load-title span{color:var(--gold);}
.load-msg{font-size:13px;line-height:1.65;color:var(--t2);max-width:300px;}
.load-msg b{color:var(--gold);font-weight:700;}
.load-bar-wrap{
  width:min(240px,65vw);height:3px;
  background:rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;
}
.load-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#b8860b,var(--gold),#fff5b0);
  border-radius:10px;
  animation:loadfill 4s linear forwards;
}
@keyframes loadfill{0%{width:0%}100%{width:100%}}
.load-hint{font-size:11px;color:var(--t3);letter-spacing:0.05em;}

/* ===== GAME SCREEN ===== */
#game-screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(245,200,66,0.07) 0%, transparent 55%),
    linear-gradient(180deg,#0b0b14 0%,#050508 100%);
  overflow:hidden;
}

/* HUD */
.hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 8px;
  position:relative;z-index:20;
}
.hud-timer{
  font-family:'Bebas Neue',sans-serif;font-size:36px;
  color:#fff;letter-spacing:0.06em;
  text-shadow:0 0 18px rgba(245,200,66,0.4);
  transition:color 0.3s;
}
.hud-timer.low{color:var(--accent);animation:tpulse 0.5s infinite;}
@keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.45}}

.hud-eggs{
  display:flex;align-items:center;gap:8px;
  font-family:'Space Mono',monospace;font-size:14px;color:var(--gold);
  font-weight:700;letter-spacing:0.04em;
}
.hud-eggs span{font-size:22px;}

.hud-hp{
  display:flex;align-items:center;gap:5px;
}
.hp-heart{font-size:18px;transition:opacity 0.3s;}
.hp-heart.lost{opacity:0.2;}

/* GAME FIELD */
#field{
  flex:1;position:relative;overflow:hidden;
  /* subtle scanlines */
}
#field::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);
}

/* floor glow */
#field::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:90px;z-index:0;
  background:linear-gradient(0deg,rgba(245,200,66,0.05),transparent);
  pointer-events:none;
}

/* PLAYER */
#player-wrap{
  position:absolute;bottom:20px;
  width:clamp(90px,22vw,140px);
  z-index:10;
  transition:left 0.07s linear;
  touch-action:none;
}
#player-img{
  width:100%;display:block;
  filter:drop-shadow(0 8px 24px rgba(245,200,66,0.25));
}
/* basket on head — invisible hit zone, visually implied */
#basket-zone{
  position:absolute;
  top:0px;
  left:50%;
  transform:translateX(-50%);
  width:68%;
  height:28%;
  /* debug: border:1px dashed red; */
  z-index:11;
}

/* FALLING ITEMS */
.item{
  position:absolute;
  font-size:clamp(24px,6vw,38px);
  z-index:8;
  pointer-events:none;
  user-select:none;
  animation:spin 1.5s linear infinite;
}
.item.bad{animation:spinfast 0.8s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes spinfast{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}

/* CATCH FLASH */
.catch-flash{
  position:absolute;
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  color:var(--gold);
  text-shadow:0 0 20px rgba(245,200,66,0.8);
  z-index:50;
  pointer-events:none;
  animation:floatup 0.7s ease-out forwards;
}
.catch-flash.bad{color:var(--accent);text-shadow:0 0 20px rgba(224,68,68,0.8);}
@keyframes floatup{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-60px) scale(1.3);}
}

/* OVERLAY common */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(5,5,8,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:30px;text-align:center;
  backdrop-filter:blur(6px);
}
.overlay.show{display:flex;}

/* RESULT OVERLAY */
.res-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(38px,10vw,60px);
  letter-spacing:0.06em;
  line-height:1.1;
}
.res-title.win{
  color:var(--gold);
  text-shadow:0 0 40px rgba(245,200,66,0.5);
}
.res-title.lose{
  color:var(--t2);
  text-shadow:none;
}
.res-sub{font-size:14px;color:var(--t2);max-width:280px;line-height:1.6;}
.res-coin{
  font-family:'Space Mono',monospace;
  font-size:18px;font-weight:700;
  color:var(--gold);
  background:rgba(245,200,66,0.1);
  border:1px solid rgba(245,200,66,0.3);
  border-radius:12px;padding:10px 24px;
  letter-spacing:0.06em;
}
.btn-play{
  margin-top:6px;
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:0.12em;
  padding:14px 44px;
  border:none;border-radius:12px;
  cursor:pointer;
  background:linear-gradient(135deg,#b8860b,var(--gold));
  color:#07070c;
  box-shadow:0 0 30px rgba(245,200,66,0.25);
  transition:transform 0.15s,box-shadow 0.15s;
}
.btn-play:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(245,200,66,0.4);}
.btn-play.dark{background:rgba(255,255,255,0.07);color:var(--t2);box-shadow:none;}

/* HP DAMAGE FLASH */
#dmg-flash{
  position:fixed;inset:0;z-index:400;pointer-events:none;
  background:rgba(192,57,43,0.35);
  opacity:0;transition:opacity 0.1s;
}
#dmg-flash.active{opacity:1;}

/* Mobile controls */
#mobile-ctrls{
  position:fixed;bottom:10px;left:0;right:0;
  display:none;
  justify-content:space-between;
  padding:0 16px;
  z-index:100;
}
@media(pointer:coarse){
  #mobile-ctrls{display:flex;}
}
.m-btn{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  font-size:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;active;
}
.m-btn:active{background:rgba(245,200,66,0.2);}

/* particles */
.star-particle{
  position:absolute;z-index:30;pointer-events:none;
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);
  animation:starburst 0.5s ease-out forwards;
}
@keyframes starburst{
  0%{opacity:1;transform:scale(1) translate(0,0);}
  100%{opacity:0;transform:scale(0) var(--tx);}
}

/* GAME OVER HEARTS */
.res-hearts{display:flex;gap:6px;justify-content:center;font-size:22px;}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="load-screen">
  <div class="load-title">VIPERR<br><span>ЯЙЦЕЛОВ</span></div>
  <div class="load-msg">Лови яйца в корзинку на голове.<br>Собери <b>10 яиц</b> за 60 секунд — и +1 VMG коин твой 🏆</div>
  <div class="load-bar-wrap"><div class="load-bar-fill"></div></div>
  <div class="load-hint">нажми чтобы начать</div>
</div>

<!-- DAMAGE FLASH -->
<div id="dmg-flash"></div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-timer" id="timer-el">1:00</div>
    <div class="hud-eggs"><span>🥚</span><span id="egg-count">0</span> / 10</div>
    <div class="hud-hp" id="hp-el">
      <div class="hp-heart" id="h1">❤️</div>
      <div class="hp-heart" id="h2">❤️</div>
      <div class="hp-heart" id="h3">❤️</div>
    </div>
  </div>

  <!-- FIELD -->
  <div id="field">
    <!-- player -->
    <div id="player-wrap">
      <div id="basket-zone"></div>
      <img id="player-img" src="IMG_20260620_221002_447.PNG" alt="player"
           onerror="this.style.display='none';document.getElementById('player-fallback').style.display='flex'">
      <!-- fallback if no image -->
      <div id="player-fallback" style="display:none;width:100%;height:140px;flex-direction:column;align-items:center;justify-content:flex-end;gap:0;">
        <div style="font-size:42px;line-height:1;">🧢</div>
        <div style="font-size:52px;line-height:1;">🧍</div>
      </div>
    </div>
  </div>

  <!-- Mobile controls -->
  <div id="mobile-ctrls">
    <div class="m-btn" id="btn-left">◀</div>
    <div class="m-btn" id="btn-right">▶</div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="result-overlay">
  <div class="res-title" id="res-title">ОГО МОЛОДЕЦ</div>
  <div class="res-hearts" id="res-hearts"></div>
  <div class="res-sub" id="res-sub">Ты поймал все 10 яиц! Виперр доволен.</div>
  <div class="res-coin" id="res-coin" style="display:none;">🪙 +1 VMG КОИН</div>
  <button class="btn-play" id="restart-btn">ИГРАТЬ СНОВА</button>
</div>

<!-- MUSIC -->
<audio id="bgm" src="song3.mp3" loop></audio>

<script>
// ========== STATE ==========
let hp = 3;
let eggs = 0;
let timeLeft = 60;
let gameRunning = false;
let tickInterval = null;
let spawnInterval = null;
let playerX = 0; // percent of field width
const PLAYER_SPEED = 0.7; // percent per frame
const PLAYER_W_FRAC = 0.22; // fraction of field width

// Keys held
const keys = {left:false, right:false};

const fieldEl = document.getElementById('field');
const playerWrap = document.getElementById('player-wrap');
const timerEl = document.getElementById('timer-el');
const eggCountEl = document.getElementById('egg-count');
const bgm = document.getElementById('bgm');
const resultOverlay = document.getElementById('result-overlay');
const dmgFlash = document.getElementById('dmg-flash');

// ========== FALLING ITEMS ==========
const GOOD_ITEMS = ['🥚','🥚','🥚','🥚','🥚','🥚','🥚','🥚','🥚','🥚'];
const BAD_ITEMS  = ['🧱','🔩','💣','🪨','🥾','🦺','⚙️','🔧'];

// ========== LOAD SCREEN ==========
const loadScreen = document.getElementById('load-screen');
loadScreen.addEventListener('click', startGame);

// Auto-hide after 4.2s
setTimeout(() => {
  loadScreen.classList.add('hide');
  setTimeout(() => loadScreen.remove(), 700);
  initGame();
}, 4200);

// ========== INIT ==========
function initGame(){
  hp = 3;
  eggs = 0;
  timeLeft = 60;
  gameRunning = false;
  updateHP();
  eggCountEl.textContent = '0';
  timerEl.textContent = '1:00';
  timerEl.classList.remove('low');
  // Center player
  const fw = fieldEl.clientWidth;
  const pw = playerWrap.offsetWidth;
  playerX = (fw/2 - pw/2) / (fw - pw) * 100;
  setPlayerPos();
  clearItems();
}

function startGame(){
  loadScreen.classList.add('hide');
  setTimeout(() => loadScreen.remove(), 700);
  beginRound();
}

function beginRound(){
  hp = 3;
  eggs = 0;
  timeLeft = 60;
  gameRunning = true;
  updateHP();
  eggCountEl.textContent = '0';
  timerEl.textContent = '1:00';
  timerEl.classList.remove('low');
  clearItems();

  // Center player
  const fw = fieldEl.clientWidth;
  const pw = playerWrap.offsetWidth;
  playerX = 50;
  setPlayerPos();

  bgm.currentTime = 0;
  bgm.volume = 0.55;
  bgm.play().catch(()=>{});

  // Timer
  clearInterval(tickInterval);
  tickInterval = setInterval(tick, 1000);

  // Item spawner
  clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnItem, 900);

  // Animation loop
  requestAnimationFrame(gameLoop);
}

// ========== GAME LOOP (movement) ==========
let lastFrame = 0;
function gameLoop(ts){
  if(!gameRunning) return;
  const dt = Math.min((ts - lastFrame) / 16.67, 3);
  lastFrame = ts;

  if(keys.left) playerX = Math.max(0, playerX - PLAYER_SPEED * dt);
  if(keys.right) playerX = Math.min(100, playerX + PLAYER_SPEED * dt);
  setPlayerPos();

  checkCollisions();
  requestAnimationFrame(gameLoop);
}

function setPlayerPos(){
  const fw = fieldEl.clientWidth;
  const pw = playerWrap.offsetWidth;
  const maxLeft = fw - pw;
  const left = (playerX / 100) * maxLeft;
  playerWrap.style.left = left + 'px';
}

// ========== TIMER ==========
function tick(){
  if(!gameRunning) return;
  timeLeft--;
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  timerEl.classList.toggle('low', timeLeft <= 15);
  if(timeLeft <= 0) endGame();
}

// ========== SPAWN ITEMS ==========
function spawnItem(){
  if(!gameRunning) return;
  const fw = fieldEl.clientWidth;
  const isGood = Math.random() < 0.6;
  const emoji = isGood
    ? GOOD_ITEMS[Math.floor(Math.random() * GOOD_ITEMS.length)]
    : BAD_ITEMS[Math.floor(Math.random() * BAD_ITEMS.length)];

  const el = document.createElement('div');
  el.className = 'item' + (isGood ? '' : ' bad');
  el.textContent = emoji;
  el.dataset.good = isGood ? '1' : '0';
  el.dataset.caught = '0';

  const left = 5 + Math.random() * 88;
  el.style.left = left + '%';
  el.style.top = '-50px';
  el.dataset.x = left;
  el.dataset.y = -50;
  el.dataset.speed = (isGood ? 1.8 + Math.random() * 1.4 : 2.8 + Math.random() * 2).toFixed(2);

  fieldEl.appendChild(el);
  animateItem(el);
}

function animateItem(el){
  function drop(){
    if(!gameRunning){ el.remove(); return; }
    if(el.dataset.caught === '1') return;
    const y = parseFloat(el.dataset.y) + parseFloat(el.dataset.speed);
    el.dataset.y = y;
    el.style.top = y + 'px';
    const fh = fieldEl.clientHeight;
    if(y > fh){ el.remove(); return; }
    requestAnimationFrame(drop);
  }
  requestAnimationFrame(drop);
}

// ========== COLLISION ==========
function checkCollisions(){
  const items = fieldEl.querySelectorAll('.item');
  const fw = fieldEl.clientWidth;
  const fh = fieldEl.clientHeight;
  const pw = playerWrap.offsetWidth;
  const ph = playerWrap.offsetHeight;
  const playerLeft = (playerX / 100) * (fw - pw);

  // Basket zone: top ~28% of player, centered, ~68% width
  const bLeft = playerLeft + pw * 0.16;
  const bRight = playerLeft + pw * 0.84;
  const bTop = fh - 20 - ph; // absolute top of player
  const bBottom = bTop + ph * 0.28;

  items.forEach(el => {
    if(el.dataset.caught === '1') return;
    const itemX_pct = parseFloat(el.dataset.x);
    const itemX = (itemX_pct / 100) * fw;
    const itemY = parseFloat(el.dataset.y);
    const itemSize = 38;
    const iLeft = itemX;
    const iRight = itemX + itemSize;
    const iBottom = itemY + itemSize;
    const iTop = itemY;

    // Check overlap with basket
    const overlap = iRight > bLeft && iLeft < bRight && iBottom > bTop && iBottom < bBottom + 30;
    if(overlap){
      el.dataset.caught = '1';
      el.style.display = 'none';
      if(el.dataset.good === '1'){
        catchEgg(el, itemX + itemSize/2, itemY);
      } else {
        hitBad(el, itemX + itemSize/2, itemY);
      }
      el.remove();
    }
  });
}

// ========== CATCH EGG ==========
function catchEgg(el, cx, cy){
  eggs++;
  eggCountEl.textContent = eggs;
  spawnFlash('+🥚', cx, cy, false);
  spawnStars(cx, cy);
  if(eggs >= 10) endGame(true);
}

// ========== HIT BAD ==========
function hitBad(el, cx, cy){
  hp--;
  updateHP();
  spawnFlash('−❤️', cx, cy, true);
  // Screen flash
  dmgFlash.classList.add('active');
  setTimeout(() => dmgFlash.classList.remove('active'), 180);
  if(hp <= 0) endGame(false, true);
}

function updateHP(){
  for(let i=1;i<=3;i++){
    document.getElementById('h'+i).classList.toggle('lost', i > hp);
  }
}

// ========== FLASH TEXT ==========
function spawnFlash(text, x, y, bad){
  const div = document.createElement('div');
  div.className = 'catch-flash' + (bad ? ' bad' : '');
  div.textContent = text;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  fieldEl.appendChild(div);
  setTimeout(() => div.remove(), 750);
}

// ========== STARS ==========
function spawnStars(x, y){
  for(let i=0;i<6;i++){
    const s = document.createElement('div');
    s.className = 'star-particle';
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const angle = (i / 6) * Math.PI * 2;
    const dist = 30 + Math.random() * 30;
    s.style.setProperty('--tx', `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`);
    fieldEl.appendChild(s);
    setTimeout(() => s.remove(), 550);
  }
}

// ========== CLEAR ITEMS ==========
function clearItems(){
  fieldEl.querySelectorAll('.item,.catch-flash,.star-particle').forEach(e => e.remove());
}

// ========== END GAME ==========
function endGame(win, dead){
  if(!gameRunning) return;
  gameRunning = false;
  clearInterval(tickInterval);
  clearInterval(spawnInterval);
  bgm.pause();

  const titleEl = document.getElementById('res-title');
  const subEl = document.getElementById('res-sub');
  const coinEl = document.getElementById('res-coin');
  const heartsEl = document.getElementById('res-hearts');

  const won = win || eggs >= 10;

  // Hearts remaining
  heartsEl.innerHTML = '';
  for(let i=1;i<=3;i++){
    heartsEl.innerHTML += `<span>${i <= hp ? '❤️' : '🖤'}</span>`;
  }

  if(won){
    titleEl.textContent = 'ОГО МОЛОДЕЦ';
    titleEl.className = 'res-title win';
    subEl.textContent = `Ты поймал 10 яиц! Виперр гордится 🏆`;
    coinEl.style.display = 'block';
  } else {
    titleEl.textContent = dead ? 'ОЙ, БОЛЬНО...' : 'ЭХ БРО';
    titleEl.className = 'res-title lose';
    const caught = eggs;
    subEl.textContent = dead
      ? `Тебя уничтожили... Поймано: ${caught}/10 🥚`
      : `Неудача, в следующий раз повезёт.\nПоймано: ${caught}/10 🥚`;
    coinEl.style.display = 'none';
  }

  resultOverlay.classList.add('show');
}

// ========== RESTART ==========
document.getElementById('restart-btn').addEventListener('click', () => {
  resultOverlay.classList.remove('show');
  clearItems();
  beginRound();
});

// ========== KEYBOARD ==========
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});
document.addEventListener('keyup', e => {
  if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

// ========== MOBILE TOUCH ==========
const btnL = document.getElementById('btn-left');
const btnR = document.getElementById('btn-right');
btnL.addEventListener('touchstart', e => { e.preventDefault(); keys.left = true; }, {passive:false});
btnL.addEventListener('touchend', () => keys.left = false);
btnR.addEventListener('touchstart', e => { e.preventDefault(); keys.right = true; }, {passive:false});
btnR.addEventListener('touchend', () => keys.right = false);
btnL.addEventListener('mousedown', () => keys.left = true);
btnL.addEventListener('mouseup', () => keys.left = false);
btnR.addEventListener('mousedown', () => keys.right = true);
btnR.addEventListener('mouseup', () => keys.right = false);

// Swipe / drag on field
let touchStartX = null;
fieldEl.addEventListener('touchmove', e => {
  if(!gameRunning) return;
  e.preventDefault();
  const tx = e.touches[0].clientX;
  const fw = fieldEl.clientWidth;
  const pw = playerWrap.offsetWidth;
  playerX = Math.max(0, Math.min(100, (tx - pw/2) / (fw - pw) * 100));
}, {passive:false});
</script>
</body>
